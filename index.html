<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bloom Droc</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --surface3: #222222;
      --border: #252525;
      --border2: #333333;
      --accent: #6d5dfc;
      --accent-dim: rgba(109,93,252,0.12);
      --text: #ececec;
      --text-sub: #777;
      --text-muted: #444;
      --success: #4ade80;
      --danger: #ef4444;
      --sidebar-w: 260px;
      --habits-h: 54px;
      --r: 8px;
      --r-sm: 5px;
      --r-lg: 12px;
    }

    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

    /* ── LOGIN ── */
    #login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 52px 44px;
      text-align: center;
      width: 360px;
    }

    .login-logo {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, #6d5dfc, #a855f7);
      border-radius: 14px;
      margin: 0 auto 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      box-shadow: 0 0 36px rgba(109,93,252,0.4);
    }

    .login-card h1 { font-size: 21px; font-weight: 700; letter-spacing: -0.4px; margin-bottom: 8px; }
    .login-card p { color: var(--text-sub); font-size: 13px; line-height: 1.6; margin-bottom: 32px; }

    .google-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 12px 20px;
      background: #fff; color: #1a1a1a;
      border: none; border-radius: var(--r);
      font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500;
      cursor: pointer; transition: opacity 0.15s;
    }
    .google-btn:hover { opacity: 0.88; }

    /* ── APP ── */
    #app { display: none; }

    /* ── HABITS BAR ── */
    #habits-bar {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--habits-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 16px; gap: 8px; z-index: 100;
    }

    .habits-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }

    #habits-scroll { display: flex; gap: 6px; align-items: center; overflow-x: auto; flex: 1; min-width: 0; }
    #habits-scroll::-webkit-scrollbar { display: none; }

    .habit-chip {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 20px; padding: 4px 12px 4px 8px;
      font-size: 12px; white-space: nowrap; cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
      user-select: none; flex-shrink: 0;
    }
    .habit-chip:hover { border-color: var(--accent); transform: translateY(-1px); }

    .habit-chip.has-link { border-style: dashed; border-color: var(--accent); background: var(--accent-dim); }
    .habit-chip.has-link:hover { background: var(--accent); color: #fff; }
    .habit-chip.has-link:hover .habit-ring { border-color: #fff; }
    .habit-link-icon { font-size: 10px; flex-shrink: 0; opacity: 0.75; }

    .habit-ring { width: 14px; height: 14px; border: 1.5px solid var(--text-muted); border-radius: 50%; flex-shrink: 0; }

    @keyframes chipOut {
      0%   { opacity: 1; max-width: 180px; }
      50%  { opacity: 0; transform: scale(0.8); }
      100% { opacity: 0; max-width: 0; padding: 0; margin: 0; border: 0; }
    }
    .habit-chip.done { animation: chipOut 0.4s forwards; }
    .all-done-msg { font-size: 12px; color: var(--success); font-weight: 500; white-space: nowrap; }

    .add-habit-btn {
      background: var(--accent-dim); border: 1.5px solid var(--accent); border-radius: 20px;
      color: var(--accent); padding: 5px 14px;
      font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer;
      white-space: nowrap; flex-shrink: 0; transition: all 0.15s;
    }
    .add-habit-btn:hover { background: var(--accent); color: #fff; }

    .signout-btn {
      background: none; border: 1px solid var(--border); color: var(--text-muted);
      font-family: 'Inter', sans-serif; font-size: 11px; padding: 5px 10px;
      border-radius: var(--r-sm); cursor: pointer; flex-shrink: 0; transition: all 0.15s;
    }
    .signout-btn:hover { border-color: var(--danger); color: var(--danger); }

    .menu-btn { display: none; background: none; border: none; color: var(--text-sub); cursor: pointer; font-size: 18px; padding: 4px 6px; flex-shrink: 0; }

    /* ── SIDEBAR ── */
    #sidebar {
      position: fixed; top: var(--habits-h); left: 0; bottom: 0;
      width: var(--sidebar-w); background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto; padding: 10px 0 32px; z-index: 50;
    }
    #sidebar::-webkit-scrollbar { width: 3px; }
    #sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .sidebar-home-btn {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 14px; margin: 0 6px 2px;
      border-radius: var(--r-sm); cursor: pointer;
      font-size: 13px; color: var(--text-sub); transition: background 0.1s;
    }
    .sidebar-home-btn:hover, .sidebar-home-btn.active { background: var(--surface2); color: var(--text); }

    .sidebar-divider { height: 1px; background: var(--border); margin: 8px 14px; }

    .sidebar-section-label {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 14px 4px;
      font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted);
    }

    .sidebar-add-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 18px; line-height: 1; padding: 0 3px; transition: color 0.15s; }
    .sidebar-add-btn:hover { color: var(--accent); }

    .category-header {
      display: flex; align-items: center;
      padding: 7px 10px 7px 12px; margin: 1px 6px;
      border-radius: var(--r-sm); cursor: pointer; gap: 8px;
      transition: background 0.1s;
      border-left: 3px solid transparent;
    }
    .category-header:hover { background: var(--surface2); }
    .category-header.active { background: var(--surface2); }

    .cat-arrow { font-size: 8px; color: var(--text-muted); transition: transform 0.15s; flex-shrink: 0; }
    .cat-arrow.open { transform: rotate(90deg); }

    .cat-color-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .cat-name { font-size: 13px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .cat-count {
      font-size: 10px; font-weight: 600; color: var(--text-muted);
      background: var(--surface3); border-radius: 10px;
      padding: 1px 7px; flex-shrink: 0; transition: opacity 0.1s;
    }
    .category-header:hover .cat-count { opacity: 0; }

    .cat-actions { display: none; gap: 2px; }
    .category-header:hover .cat-actions { display: flex; }

    .icon-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 2px 5px; font-size: 11px; border-radius: 3px; transition: all 0.1s; }
    .icon-btn:hover { background: var(--surface3); color: var(--text); }

    .subcategories { padding-left: 14px; }

    .sub-item {
      display: flex; align-items: center;
      padding: 5px 10px 5px 12px; margin: 1px 6px;
      border-radius: var(--r-sm); cursor: pointer;
      font-size: 12px; color: var(--text-sub); gap: 8px; transition: background 0.1s;
    }
    .sub-item:hover, .sub-item.active { background: var(--surface2); color: var(--text); }
    .sub-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; }
    .sub-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sub-actions { display: none; }
    .sub-item:hover .sub-actions { display: flex; gap: 2px; }

    /* ── MAIN ── */
    #main {
      margin-left: var(--sidebar-w); margin-top: var(--habits-h);
      min-height: calc(100vh - var(--habits-h));
      padding: 0 0 80px;
    }

    /* ── HOME ── */
    .home-wrap { padding: 40px 48px; }
    .home-greeting { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; }
    .home-sub { font-size: 13px; color: var(--text-sub); margin-bottom: 32px; line-height: 1.5; }

    .stats-row { display: flex; gap: 12px; margin-bottom: 36px; flex-wrap: wrap; }

    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 18px 22px; flex: 1; min-width: 110px;
      transition: all 0.15s;
    }
    .stat-card.clickable { cursor: pointer; }
    .stat-card.clickable:hover { background: var(--surface2); border-color: var(--accent); transform: translateY(-2px); }
    .stat-num { font-size: 28px; font-weight: 700; letter-spacing: -1px; color: var(--accent); line-height: 1; margin-bottom: 4px; }
    .stat-label { font-size: 11px; color: var(--text-sub); }

    .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; margin-top: 8px; align-items: start; }

    .cat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-lg); padding: 18px 16px; cursor: pointer;
      transition: all 0.18s; border-top: 3px solid transparent;
    }
    .cat-card:hover { background: var(--surface2); transform: translateY(-2px); }
    .cat-card-name { font-size: 13px; font-weight: 600; }
    .cat-card-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    .cat-card-dropdown { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 2px; }
    .cat-card-dropdown-item { font-size: 12px; color: var(--text-sub); padding: 6px 8px; border-radius: var(--r-sm); transition: background 0.12s, color 0.12s; }
    .cat-card-dropdown-item:hover { background: var(--surface3); color: var(--text); }
    .cat-card-dropdown-empty { font-size: 11px; color: var(--text-muted); padding: 4px 8px; }

    /* ── CONTENT PAGE ── */
    .content-hero {
      padding: 32px 48px 28px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0;
      position: relative;
      overflow: hidden;
    }

    /* tinted bg overlay — set via JS with category color */
    .content-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--cat-bg, transparent);
      pointer-events: none;
    }

    .content-breadcrumb { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.08em; }

    .content-title-row { display: flex; align-items: center; gap: 12px; }
    .content-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }

    .content-body { padding: 32px 48px 0; }

    .section { margin-bottom: 36px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .section-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); }

    .section-add-btn {
      background: none; border: none; color: var(--accent);
      font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500;
      cursor: pointer; padding: 3px 8px; border-radius: var(--r-sm); transition: background 0.1s;
    }
    .section-add-btn:hover { background: var(--accent-dim); }

    /* ── TODOS ── */
    .todo-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--r);
      margin-bottom: 5px; cursor: pointer;
      transition: border-color 0.15s, background 0.15s; overflow: hidden;
    }
    .todo-item:hover { border-color: var(--border2); background: var(--surface2); }
    .todo-box { width: 17px; height: 17px; border: 1.5px solid var(--border2); border-radius: 4px; flex-shrink: 0; transition: all 0.2s; }

    @keyframes todoOut {
      0%   { opacity: 1; max-height: 55px; padding-top: 10px; padding-bottom: 10px; margin-bottom: 5px; }
      100% { opacity: 0; max-height: 0; padding-top: 0; padding-bottom: 0; margin-bottom: 0; border-width: 0; }
    }
    .todo-item.completing { animation: todoOut 0.35s ease-in forwards; }
    .todo-item.completing .todo-box { background: var(--success); border-color: var(--success); }

    .todo-text { font-size: 13px; flex: 1; line-height: 1.4; }
    .todo-del { display: none; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 12px; padding: 2px 6px; border-radius: 3px; flex-shrink: 0; }
    .todo-item:hover .todo-del { display: block; }
    .todo-del:hover { background: rgba(239,68,68,0.12); color: var(--danger); }

    /* ── LINKS ── */
    .link-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--r);
      margin-bottom: 5px; text-decoration: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .link-row:hover { background: var(--surface2); border-color: var(--accent); }
    .link-fav { width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0; }
    .link-title { font-size: 13px; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .link-domain { font-size: 11px; color: var(--text-muted); max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; }
    .link-del { display: none; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 12px; padding: 2px 6px; border-radius: 3px; flex-shrink: 0; }
    .link-row:hover .link-del { display: block; }
    .link-del:hover { background: rgba(239,68,68,0.12); color: var(--danger); }

    /* ── NOTES ── */
    .notes-area {
      width: 100%; min-height: 140px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 14px 16px;
      color: var(--text); font-family: 'Inter', sans-serif;
      font-size: 13px; line-height: 1.7; resize: vertical; transition: border-color 0.15s;
    }
    .notes-area:focus { outline: none; border-color: var(--accent); }
    .notes-area::placeholder { color: var(--text-muted); }

    .empty-line { font-size: 12px; color: var(--text-muted); padding: 6px 0; }

    /* ── INPUTS ── */
    .input-field {
      width: 100%; background: var(--surface2); border: 1px solid var(--border2);
      border-radius: var(--r); padding: 10px 13px; color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 13px;
      transition: border-color 0.15s; margin-bottom: 10px;
    }
    .input-field:focus { outline: none; border-color: var(--accent); }
    .input-field::placeholder { color: var(--text-muted); }

    /* ── BUTTONS ── */
    .btn-primary { background: var(--accent); border: none; border-radius: var(--r); color: #fff; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; padding: 9px 20px; cursor: pointer; transition: opacity 0.15s; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-ghost { background: none; border: 1px solid var(--border2); border-radius: var(--r); color: var(--text-sub); font-family: 'Inter', sans-serif; font-size: 13px; padding: 9px 20px; cursor: pointer; transition: all 0.15s; }
    .btn-ghost:hover { color: var(--text); border-color: var(--text-muted); }

    /* ── MODAL ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; padding: 26px; width: 400px; max-width: 92vw; }
    .modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 18px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 6px; }

    /* ── TOAST ── */
    #toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--r); padding: 9px 16px; font-size: 12px; color: var(--text-sub); z-index: 300; transform: translateY(60px); opacity: 0; transition: all 0.22s; pointer-events: none; }
    #toast.show { transform: translateY(0); opacity: 1; }

    /* ── CALENDAR ── */
    .cal-header { display: flex; align-items: center; gap: 14px; margin-bottom: 22px; }
    .cal-nav-btn {
      background: var(--surface); border: 1px solid var(--border2); color: var(--text);
      width: 30px; height: 30px; border-radius: var(--r-sm); cursor: pointer;
      font-size: 15px; display: flex; align-items: center; justify-content: center; transition: all 0.15s;
    }
    .cal-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
    .cal-month-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; min-width: 170px; }
    .cal-today-btn {
      background: var(--accent-dim); border: 1px solid var(--accent); color: var(--accent);
      font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600;
      padding: 6px 14px; border-radius: var(--r-sm); cursor: pointer; margin-left: auto; transition: all 0.15s;
    }
    .cal-today-btn:hover { background: var(--accent); color: #fff; }

    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
    .cal-dow { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); text-align: center; padding-bottom: 6px; }
    .cal-day {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
      min-height: 78px; padding: 8px; cursor: pointer; transition: all 0.15s;
      display: flex; flex-direction: column; gap: 4px;
    }
    .cal-day:hover { border-color: var(--accent); background: var(--surface2); }
    .cal-day.empty { background: transparent; border-color: transparent; cursor: default; }
    .cal-day.empty:hover { background: transparent; border-color: transparent; }
    .cal-day.today { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
    .cal-day.selected { background: var(--accent-dim); border-color: var(--accent); }
    .cal-day-num { font-size: 13px; font-weight: 600; }
    .cal-day.today .cal-day-num { color: var(--accent); }
    .cal-day-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-top: auto; }
    .cal-day-count { font-size: 10px; color: var(--text-muted); margin-top: auto; }

    .cal-panel {
      margin-top: 24px; background: var(--surface); border: 1px solid var(--border2);
      border-radius: var(--r-lg); padding: 20px 22px;
    }
    .cal-panel-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
    .cal-entry {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 11px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r); margin-bottom: 6px; font-size: 13px;
    }
    .cal-entry span { flex: 1; }
    .cal-entry button { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 12px; padding: 2px 6px; border-radius: 3px; }
    .cal-entry button:hover { background: rgba(239,68,68,0.12); color: var(--danger); }
    .cal-add-row { display: flex; gap: 8px; margin-top: 10px; }
    .cal-add-row .input-field { margin-bottom: 0; }

    /* ── ENTRIES (title + instructions, category page) ── */
    .entry-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
      padding: 12px 14px; margin-bottom: 6px;
    }
    .entry-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 5px; }
    .entry-title { font-size: 13px; font-weight: 600; }
    .entry-del { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 12px; padding: 2px 6px; border-radius: 3px; flex-shrink: 0; }
    .entry-del:hover { background: rgba(239,68,68,0.12); color: var(--danger); }
    .entry-details { font-size: 12px; color: var(--text-sub); line-height: 1.55; white-space: pre-wrap; }

    /* ── TODO EXTRAS (priority/due date) ── */
    .todo-meta { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
    .todo-badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px; white-space: nowrap; }
    .badge-high { background: rgba(239,68,68,0.15); color: #f87171; }
    .badge-med  { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .badge-low  { background: rgba(107,114,128,0.15); color: #9ca3af; }
    .todo-due { font-size: 10px; color: var(--text-muted); }
    .todo-due.overdue { color: var(--danger); font-weight: 600; }

    /* ── SECTION VARIANTS (checklist/goals/ideas/stats) ── */
    .check-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--r);
      margin-bottom: 5px; cursor: pointer; transition: all 0.15s;
    }
    .check-item:hover { border-color: var(--border2); background: var(--surface2); }
    .check-item.done { opacity: 0.5; }
    .check-item.done .check-text { text-decoration: line-through; }
    .check-box { width: 17px; height: 17px; border: 1.5px solid var(--border2); border-radius: 4px; flex-shrink: 0; transition: all 0.15s; }
    .check-item.done .check-box { background: var(--success); border-color: var(--success); }
    .check-text { font-size: 13px; flex: 1; }

    .goal-item { padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 8px; }
    .goal-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .goal-title { font-size: 13px; font-weight: 600; }
    .goal-pct { font-size: 12px; font-weight: 700; color: var(--accent); }
    .goal-bar-track { width: 100%; height: 7px; background: var(--surface3); border-radius: 10px; overflow: hidden; margin-bottom: 8px; }
    .goal-bar-fill { height: 100%; background: var(--accent); border-radius: 10px; transition: width 0.2s; }
    .goal-slider { width: 100%; accent-color: var(--accent); }
    .goal-del { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 11px; }
    .goal-del:hover { color: var(--danger); }

    .idea-chip {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
      padding: 7px 8px 7px 14px; margin: 0 6px 6px 0; font-size: 12px;
    }
    .idea-chip button { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 11px; padding: 2px 6px; border-radius: 50%; }
    .idea-chip button:hover { background: rgba(239,68,68,0.12); color: var(--danger); }
    .idea-wrap { display: flex; flex-wrap: wrap; }

    .stat-row-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
      margin-bottom: 5px; font-size: 13px;
    }
    .stat-row-label { color: var(--text-sub); flex: 1; }
    .stat-row-value { font-weight: 700; color: var(--accent); }
    .stat-row-del { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 12px; padding: 2px 6px; border-radius: 3px; }
    .stat-row-del:hover { background: rgba(239,68,68,0.12); color: var(--danger); }

    /* ── GLOBAL TO-DO LIST PAGE ── */
    .tl-header { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .tl-sub { font-size: 13px; color: var(--text-sub); margin-bottom: 24px; }
    .tl-quickadd { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .tl-quickadd input.input-field { margin-bottom: 0; flex: 1; min-width: 180px; }
    .tl-quickadd select.input-field, .tl-quickadd input[type=date].input-field { margin-bottom: 0; width: auto; flex: 0 0 auto; }
    .tl-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
    .tl-tab { background: var(--surface); border: 1px solid var(--border2); color: var(--text-sub); font-family:'Inter',sans-serif; font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 20px; cursor: pointer; transition: all 0.15s; }
    .tl-tab.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    /* ── PROJECTS (inside To-Do List page) ── */
    .proj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; }
    .proj-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-lg); padding: 16px; cursor: pointer;
      transition: all 0.18s; position: relative;
    }
    .proj-card:hover { background: var(--surface2); transform: translateY(-2px); border-color: var(--accent); }
    .proj-card-name { font-size: 13px; font-weight: 600; padding-right: 16px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .proj-card-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .proj-card-del {
      position: absolute; top: 10px; right: 10px;
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      font-size: 11px; padding: 2px 5px; border-radius: 3px; display: none;
    }
    .proj-card:hover .proj-card-del { display: block; }
    .proj-card-del:hover { background: rgba(239,68,68,0.12); color: var(--danger); }
    .proj-new-card {
      background: var(--accent-dim); border: 1.5px dashed var(--accent);
      border-radius: var(--r-lg); padding: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--accent); font-size: 13px; font-weight: 600; transition: all 0.15s;
      min-height: 62px;
    }
    .proj-new-card:hover { background: var(--accent); color: #fff; }
    .proj-back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: none; border: none; color: var(--text-sub);
      font-family: 'Inter', sans-serif; font-size: 12px; cursor: pointer;
      padding: 4px 0; margin-bottom: 18px; transition: color 0.15s;
    }
    .proj-back-btn:hover { color: var(--accent); }
    .notes-area-sm { min-height: 70px; }

    /* ── QUICK LINKS PAGE ── */
    .qlink-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-top: 8px; }
    .qlink-card {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-lg); padding: 14px; cursor: pointer;
      transition: all 0.18s; position: relative; text-decoration: none; color: var(--text);
    }
    .qlink-card:hover { background: var(--surface2); border-color: var(--accent); transform: translateY(-2px); }
    .qlink-favicon { width: 22px; height: 22px; border-radius: 5px; flex-shrink: 0; }
    .qlink-title { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 14px; }
    .qlink-del {
      position: absolute; top: 8px; right: 8px;
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      font-size: 11px; padding: 2px 5px; border-radius: 3px; display: none;
    }
    .qlink-card:hover .qlink-del { display: block; }
    .qlink-del:hover { background: rgba(239,68,68,0.12); color: var(--danger); }
    .qlink-new-card {
      background: var(--accent-dim); border: 1.5px dashed var(--accent);
      border-radius: var(--r-lg); padding: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--accent); font-size: 13px; font-weight: 600; transition: all 0.15s;
      min-height: 50px;
    }
    .qlink-new-card:hover { background: var(--accent); color: #fff; }

    /* ── VAULT ── */
    .vault-card { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--r-lg); padding: 24px; max-width: 380px; }
    .vault-card-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
    .vault-card-sub { font-size: 12px; color: var(--text-sub); margin-bottom: 16px; line-height: 1.5; }
    .vault-entry { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 6px; }
    .vault-entry-label { font-size: 12px; font-weight: 600; color: var(--text-sub); width: 140px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .vault-entry-value { font-size: 12px; font-family: 'Courier New', monospace; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
    .vault-unlocked-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }

    /* ── REMINDERS PAGE ── */
    .rem-notice {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: var(--r); padding: 12px 16px; margin-bottom: 20px; font-size: 12px; color: var(--text-sub);
    }
    .rem-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--r);
      margin-bottom: 6px;
    }
    .rem-item.overdue { border-color: rgba(239,68,68,0.4); }
    .rem-item.fired { opacity: 0.5; }
    .rem-text { font-size: 13px; flex: 1; }
    .rem-when { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
    .rem-when.overdue { color: var(--danger); font-weight: 600; }
    .rem-del { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 12px; padding: 2px 6px; border-radius: 3px; flex-shrink: 0; }
    .rem-del:hover { background: rgba(239,68,68,0.12); color: var(--danger); }

    /* ── MOBILE ── */
    @media (max-width: 720px) {
      #sidebar { transform: translateX(-260px); transition: transform 0.25s; }
      #sidebar.open { transform: translateX(0); }
      #main { margin-left: 0; }
      .home-wrap, .content-hero, .content-body { padding-left: 20px; padding-right: 20px; }
      .menu-btn { display: block !important; }
      .cal-day { min-height: 54px; padding: 5px; }
    }

    .overlay-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 49; }
    .overlay-bg.open { display: block; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-page">
  <div class="login-card">
    <div class="login-logo">⚡</div>
    <h1>Bloom Droc</h1>
    <p>Your personal command centre — habits, tasks, links, and goals all in one place.</p>
    <button class="google-btn" id="google-signin-btn">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

</div>

<!-- APP -->
<div id="app">
  <div id="habits-bar">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <span class="habits-label">Today</span>
    <div id="habits-scroll"></div>
    <button class="add-habit-btn" id="add-habit-btn">+ Add habit</button>
    <button class="signout-btn" id="signout-btn">Sign out</button>
  </div>

  <div id="sidebar">
    <div class="sidebar-home-btn" id="home-btn" onclick="goHome()">🏠 Home</div>
    <div id="school-nav"></div>
    <div class="sidebar-home-btn" id="calendar-btn" onclick="goCalendar()">📅 Calendar</div>
    <div class="sidebar-home-btn" id="todolist-btn" onclick="goTodoList()">✅ To-Do List</div>
    <div class="sidebar-home-btn" id="quicklinks-btn" onclick="goQuickLinks()">🔗 Quick Links</div>
    <div class="sidebar-home-btn" id="reminders-btn" onclick="goReminders()">⏰ Reminders</div>
    <div class="sidebar-home-btn" id="vault-btn" onclick="goVault()">🔒 Vault</div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section-label">
      Categories
      <button class="sidebar-add-btn" id="sidebar-add-cat-btn" title="New category">+</button>
    </div>
    <div id="categories-list"></div>
  </div>

  <div class="overlay-bg" id="overlay-bg" onclick="closeSidebar()"></div>

  <div id="main">
    <div id="content-area"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">Add</h3>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn-ghost" id="modal-cancel">Cancel</button>
      <button class="btn-primary" id="modal-confirm">Add</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp }        from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc,
  onSnapshot, query, orderBy, serverTimestamp, setDoc, getDoc, where }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyBVYZFLkqc1lqHf7wxwGXAY_yRxJnxQhvQ",
  authDomain: "daily-life-16889.firebaseapp.com",
  projectId: "daily-life-16889",
  storageBucket: "daily-life-16889.firebasestorage.app",
  messagingSenderId: "355962987531",
  appId: "1:355962987531:web:6b40933fb040dee462530e"
};

const fbApp = initializeApp(firebaseConfig);
const auth  = getAuth(fbApp);
const db    = getFirestore(fbApp);

// ── PALETTE (gem tones, dark-mode vibrant) ──
const PALETTE = [
  '#6d5dfc', // sapphire
  '#10b981', // emerald
  '#f59e0b', // amber
  '#ef4444', // ruby
  '#06b6d4', // cyan
  '#a855f7', // amethyst
  '#f97316', // topaz
  '#14b8a6', // teal jade
  '#e879f9', // fuchsia
  '#3b82f6', // cobalt
  '#84cc16', // lime
  '#f43f5e', // rose
];

// Auto-assign next color — guaranteed sequential, no bugs
// (School is pinned and fixed-color, so it's excluded from this rotation)
function pickColor() {
  const count = categories.filter(c => !c.special).length;
  return PALETTE[count % PALETTE.length];
}

// School is pinned outside the normal Categories list and always gets this one color
const SCHOOL_COLOR = '#fbbf24';
let schoolInitAttempted = false;

// ── STATE ──
let currentUser = null;
let currentView = { type: 'home', catId: null, subId: null };
let categories  = [];
let subcats     = [];
let habits      = [];
let openCats    = new Set();
let homeOpenCats = new Set();
let unsubs      = [];
let tlFilter    = 'active'; // for global to-do list page: 'active' | 'done' | 'all'

// calendar state
let calendarViewDate = new Date();
let calendarEvents   = [];
let selectedCalDate  = null;

// projects state (inside To-Do List page)
let projects        = [];
let currentProjectId = null;

// quick links state (standalone page for everyday links)
let quickLinks = [];

// reminders state (desktop-notification reminders)
let reminders = [];
let reminderCheckStarted = false;

// vault state — vaultKey and vaultDecryptedCache NEVER touch Firestore, in-memory only
let vaultMeta = null;
let vaultEntries = [];
let vaultKey = null;
let vaultDecryptedCache = {};
let vaultLockTimer = null;

const col   = n      => collection(db, 'users', currentUser.uid, n);
const dref  = (n,id) => doc(db, 'users', currentUser.uid, n, id);
const today = ()     => new Date().toISOString().split('T')[0];
const esc   = s      => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ── AUTH ──
document.getElementById('google-signin-btn').onclick = async () => {
  try { await signInWithPopup(auth, new GoogleAuthProvider()); }
  catch { showToast('Sign-in failed — try again'); }
};

document.getElementById('signout-btn').onclick = async () => {
  unsubs.forEach(u => u()); unsubs = [];
  vaultKey = null; vaultDecryptedCache = {}; vaultMeta = null; vaultEntries = [];
  clearTimeout(vaultLockTimer);
  await signOut(auth);
};

onAuthStateChanged(auth, user => {
  currentUser = user;
  if (user) {
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  } else {
    document.getElementById('login-page').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

// ── INIT ──
function initApp() {
  unsubs.push(onSnapshot(query(col('habits'), orderBy('createdAt')), snap => {
    habits = snap.docs.map(d => ({id:d.id,...d.data()}));
    renderHabitsBar();
    if (currentView.type === 'home') renderHome();
  }));
  unsubs.push(onSnapshot(query(col('categories'), orderBy('createdAt')), snap => {
    categories = snap.docs.map(d => ({id:d.id,...d.data()}));
    if (!schoolInitAttempted && !categories.some(c => c.special === 'school')) {
      schoolInitAttempted = true;
      addDoc(col('categories'), { name:'School', color:SCHOOL_COLOR, special:'school', createdAt:serverTimestamp() });
    }
    renderSidebar();
    if (currentView.type === 'home') renderHome();
  }));
  unsubs.push(onSnapshot(query(col('subcats'), orderBy('createdAt')), snap => {
    subcats = snap.docs.map(d => ({id:d.id,...d.data()}));
    renderSidebar();
  }));
  unsubs.push(onSnapshot(query(col('calendarEvents'), orderBy('date')), snap => {
    calendarEvents = snap.docs.map(d => ({id:d.id,...d.data()}));
    if (currentView.type === 'calendar') renderCalendar();
  }));
  unsubs.push(onSnapshot(query(col('projects'), orderBy('createdAt')), snap => {
    projects = snap.docs.map(d => ({id:d.id,...d.data()}));
    if (currentView.type === 'todolist') renderTodoListPage();
    if (currentView.type === 'project') renderProjectPage();
  }));
  unsubs.push(onSnapshot(query(col('quickLinks'), orderBy('createdAt')), snap => {
    quickLinks = snap.docs.map(d => ({id:d.id,...d.data()}));
    if (currentView.type === 'quicklinks') renderQuickLinksPage();
  }));
  unsubs.push(onSnapshot(query(col('reminders'), orderBy('when')), snap => {
    reminders = snap.docs.map(d => ({id:d.id,...d.data()}));
    if (currentView.type === 'reminders') renderRemindersPage();
  }));
  unsubs.push(onSnapshot(dref('vaultMeta','meta'), snap => {
    vaultMeta = snap.exists() ? snap.data() : null;
    if (currentView.type === 'vault') renderVaultBody();
  }));
  unsubs.push(onSnapshot(query(col('vaultEntries'), orderBy('createdAt')), snap => {
    vaultEntries = snap.docs.map(d => ({id:d.id,...d.data()}));
    if (currentView.type === 'vault' && vaultKey) renderVaultEntries();
  }));
  if (!reminderCheckStarted) {
    reminderCheckStarted = true;
    setInterval(checkReminders, 20000);
  }
  renderHome();
}

// ── HABITS BAR ──
function renderHabitsBar() {
  const el = document.getElementById('habits-scroll');
  const t  = today();
  const pending = habits.filter(h => !(h.completedDates||[]).includes(t));
  el.innerHTML = '';
  if (!habits.length) { el.innerHTML = '<span style="font-size:11px;color:var(--text-muted)">No habits yet</span>'; return; }
  if (!pending.length) { el.innerHTML = '<span class="all-done-msg">✓ All habits done today!</span>'; return; }
  pending.forEach(h => {
    const chip = document.createElement('div');
    const hasLink = !!h.link;
    chip.className = 'habit-chip' + (hasLink ? ' has-link' : '');
    chip.title = hasLink
      ? 'Click to open the link — double-click to mark done. Right-click to delete.'
      : 'Click to mark done. Right-click to delete.';
    chip.innerHTML = `<div class="habit-ring"></div>${hasLink ? '<span class="habit-link-icon">🔗</span>' : ''}<span>${esc(h.name)}</span>`;

    const completeHabit = () => {
      chip.classList.add('done');
      updateDoc(dref('habits',h.id), { completedDates: [...(h.completedDates||[]), t] });
    };

    if (hasLink) {
      let clickTimer = null;
      chip.onclick = () => {
        if (clickTimer) {
          clearTimeout(clickTimer);
          clickTimer = null;
          completeHabit();
        } else {
          clickTimer = setTimeout(() => {
            clickTimer = null;
            window.open(h.link, '_blank', 'noopener');
          }, 260);
        }
      };
    } else {
      chip.onclick = completeHabit;
    }

    chip.oncontextmenu = e => {
      e.preventDefault();
      if (confirm(`Delete habit "${h.name}"? This can't be undone.`)) {
        deleteDoc(dref('habits', h.id));
        showToast('Habit deleted');
      }
    };
    el.appendChild(chip);
  });
}

document.getElementById('add-habit-btn').onclick = () => {
  openModal('New Daily Habit', [
    { type:'input', id:'name', placeholder:'100 push-ups, Daily reading…' },
    { type:'input', id:'link', label:'Link (optional)', placeholder:'e.g. https://duolingo.com — for habits done on a website' }
  ], 'Add Habit', async vals => {
    if (!vals.name) return;
    let link = vals.link ? vals.link.trim() : '';
    if (link && !link.startsWith('http')) link = 'https://' + link;
    await addDoc(col('habits'), { name:vals.name, link: link || null, completedDates:[], createdAt:serverTimestamp() });
    showToast('Habit added');
  });
};

// ── SIDEBAR ──
function renderSidebar() {
  const list    = document.getElementById('categories-list');
  const homeBtn = document.getElementById('home-btn');
  const calBtn  = document.getElementById('calendar-btn');
  const tlBtn   = document.getElementById('todolist-btn');
  const qlBtn   = document.getElementById('quicklinks-btn');
  const remBtn  = document.getElementById('reminders-btn');
  const vaultBtn = document.getElementById('vault-btn');
  const schoolNav = document.getElementById('school-nav');
  list.innerHTML = '';
  if (homeBtn) homeBtn.className = 'sidebar-home-btn' + (currentView.type==='home' ? ' active' : '');
  if (calBtn)  calBtn.className  = 'sidebar-home-btn' + (currentView.type==='calendar' ? ' active' : '');
  if (tlBtn)   tlBtn.className   = 'sidebar-home-btn' + ((currentView.type==='todolist'||currentView.type==='project') ? ' active' : '');

// Shared click handler for both the regular categories list and the pinned School nav
function sidebarDelegatedClick(e) {
  const btn = e.target.closest('[data-action]');
  if (btn) {
    e.stopPropagation();
    const {action,catid,subid,name} = btn.dataset;
    if (action==='addsub') openAddSub(catid);
    if (action==='delcat') { if(confirm(`Delete "${name}" and all its content?`)) { deleteDoc(dref('categories',catid)); if(currentView.catId===catid){goHome();} showToast('Deleted'); } }
    if (action==='delsub') { if(confirm(`Delete "${name}"?`)) { deleteDoc(dref('subcats',subid)); if(currentView.subId===subid){goHome();} showToast('Deleted'); } }
    return;
  }
  const subEl = e.target.closest('[data-subid]');
  if (subEl && !e.target.closest('.sub-actions')) {
    currentView = { type:'sub', catId:subEl.dataset.catid, subId:subEl.dataset.subid };
    renderSidebar(); renderContentView(); closeSidebar(); return;
  }
  const catEl = e.target.closest('[data-catid]');
  if (catEl && !e.target.closest('.cat-actions') && !e.target.closest('[data-subid]')) {
    const id = catEl.dataset.catid;
    openCats.has(id) ? openCats.delete(id) : openCats.add(id);
    currentView = { type:'cat', catId:id, subId:null };
    renderSidebar(); renderContentView(); closeSidebar();
  }
}

const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOW_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function dateKey(y,m,d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

// An event covers a day if that day falls between its start date and end date
// (single-day events just have date === endDate, since endDate is optional).
function eventCoversDay(ev, key) {
  const end = ev.endDate || ev.date;
  return key >= ev.date && key <= end;
}

function niceShortDate(key) {
  const [yy,mm,dd] = key.split('-').map(Number);
  return new Date(yy, mm-1, dd).toLocaleDateString('en-AU', { day:'numeric', month:'short' });
}

function renderCalendar() {
  if (currentView.type !== 'calendar') return;
  const area = document.getElementById('content-area');
  const y = calendarViewDate.getFullYear();
  const m = calendarViewDate.getMonth();
  const firstDow = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const t = today();

  area.innerHTML = `
    <div class="home-wrap">
      <div class="cal-header">
        <button class="cal-nav-btn" id="cal-prev">‹</button>
        <div class="cal-month-title">${MONTH_NAMES[m]} ${y}</div>
        <button class="cal-nav-btn" id="cal-next">›</button>
        <button class="cal-today-btn" id="cal-today-btn">Today — ${MONTH_NAMES[new Date().getMonth()]} ${new Date().getDate()}</button>
        <button class="cal-today-btn" id="cal-multiday-btn" style="margin-left:8px">+ Multi-day event</button>
      </div>
      <div class="cal-grid" id="cal-grid">
        ${DOW_NAMES.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
      </div>
      <div id="cal-panel-wrap"></div>
    </div>
  `;

  const grid = document.getElementById('cal-grid');
  for (let i=0; i<firstDow; i++) grid.insertAdjacentHTML('beforeend', `<div class="cal-day empty"></div>`);
  for (let d=1; d<=daysInMonth; d++) {
    const key = dateKey(y,m,d);
    const isToday = key === t;
    const isSelected = key === selectedCalDate;
    const count = calendarEvents.filter(ev => eventCoversDay(ev, key)).length;
    const cell = document.createElement('div');
    cell.className = 'cal-day' + (isToday?' today':'') + (isSelected?' selected':'');
    cell.innerHTML = `<div class="cal-day-num">${d}</div>${count ? `<div class="cal-day-count">${count} item${count>1?'s':''}</div><div class="cal-day-dot"></div>` : ''}`;
    cell.onclick = () => { selectedCalDate = key; renderCalendar(); };
    grid.appendChild(cell);
  }

  document.getElementById('cal-prev').onclick = () => { calendarViewDate = new Date(y, m-1, 1); renderCalendar(); };
  document.getElementById('cal-next').onclick = () => { calendarViewDate = new Date(y, m+1, 1); renderCalendar(); };
  document.getElementById('cal-today-btn').onclick = () => { calendarViewDate = new Date(); selectedCalDate = t; renderCalendar(); };
  document.getElementById('cal-multiday-btn').onclick = () => {
    openModal('New Multi-day Event', [
      { type:'input', id:'text', placeholder:'e.g. 5 pillowcases arriving' },
      { type:'date', id:'start', label:'Start date', default: selectedCalDate || t },
      { type:'date', id:'end',   label:'End date',   default: selectedCalDate || t }
    ], 'Add to Calendar', async vals => {
      if (!vals.text || !vals.start) return;
      const end = vals.end && vals.end >= vals.start ? vals.end : vals.start;
      await addDoc(col('calendarEvents'), { date: vals.start, endDate: end, text: vals.text, createdAt: serverTimestamp() });
      showToast('Added to calendar');
    });
  };

  renderCalPanel();
}

function renderCalPanel() {
  const wrap = document.getElementById('cal-panel-wrap');
  if (!wrap || !selectedCalDate) return;
  const entries = calendarEvents.filter(ev => eventCoversDay(ev, selectedCalDate));
  const [yy,mm,dd] = selectedCalDate.split('-').map(Number);
  const niceDate = new Date(yy, mm-1, dd).toLocaleDateString('en-AU', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  wrap.innerHTML = `
    <div class="cal-panel">
      <div class="cal-panel-title">${niceDate}</div>
      <div id="cal-entries">
        ${entries.length ? entries.map(ev => {
          const isRange = ev.endDate && ev.endDate !== ev.date;
          const rangeLabel = isRange ? `<span style="font-size:10px;color:var(--text-muted);margin-right:6px">${niceShortDate(ev.date)} – ${niceShortDate(ev.endDate)}</span>` : '';
          return `<div class="cal-entry">${rangeLabel}<span>${esc(ev.text)}</span><button data-id="${ev.id}">✕</button></div>`;
        }).join('') : `<div class="empty-line">Nothing added for this day yet.</div>`}
      </div>
      <div class="cal-add-row">
        <input class="input-field" id="cal-new-entry" placeholder="Add something for this day…"/>
        <button class="btn-primary" id="cal-add-entry-btn">Add</button>
      </div>
    </div>
  `;

  wrap.querySelectorAll('#cal-entries button').forEach(btn => {
    btn.onclick = () => { deleteDoc(dref('calendarEvents', btn.dataset.id)); showToast('Removed'); };
  });

  const input = document.getElementById('cal-new-entry');
  const addBtn = document.getElementById('cal-add-entry-btn');
  const submit = async () => {
    const val = input.value.trim();
    if (!val) return;
    await addDoc(col('calendarEvents'), { date: selectedCalDate, endDate: selectedCalDate, text: val, createdAt: serverTimestamp() });
    input.value = '';
    showToast('Added to calendar');
  };
  addBtn.onclick = submit;
  input.onkeydown = e => { if (e.key==='Enter') submit(); };
}

function localDT(d) {
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
}

function formatWhen(when) {
  const [datePart, timePart] = when.split('T');
  const [yy,mm,dd] = datePart.split('-').map(Number);
  const d = new Date(yy, mm-1, dd);
  const dateStr = d.toLocaleDateString('en-AU', { day:'numeric', month:'short' });
  let [h,min] = timePart.split(':').map(Number);
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${dateStr}, ${h}:${String(min).padStart(2,'0')} ${ampm}`;
}

function checkReminders() {
  if (!currentUser || !reminders.length) return;
  const nowStr = localDT(new Date());
  reminders.forEach(r => {
    if (!r.fired && r.when <= nowStr) {
      fireReminderNotification(r);
      updateDoc(dref('reminders', r.id), { fired: true });
    }
  });
}

}

// ── VAULT (password-protected, AES-256 encrypted client-side) ──
// The vault password is NEVER sent anywhere or stored — it only ever exists
// in this tab's memory long enough to derive an encryption key. Firestore
// only ever sees ciphertext. There is no password reset — losing the
// password means losing what's stored.
function b64FromBytes(bytes) {
  let binary = '';
  bytes.forEach(b => binary += String.fromCharCode(b));
  return btoa(binary);
}
function bytesFromB64(b64) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i=0; i<binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}
async function deriveVaultKey(password, saltBytes) {
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt: saltBytes, iterations: 250000, hash:'SHA-256' },
    baseKey,
    { name:'AES-GCM', length:256 },
    false,
    ['encrypt','decrypt']
  );
}
async function vaultEncrypt(key, plaintext) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const cipherBuf = await crypto.subtle.encrypt({name:'AES-GCM', iv}, key, new TextEncoder().encode(plaintext));
  return { iv: b64FromBytes(iv), cipher: b64FromBytes(new Uint8Array(cipherBuf)) };
}
async function vaultDecrypt(key, ivB64, cipherB64) {
  const iv = bytesFromB64(ivB64);
  const cipherBytes = bytesFromB64(cipherB64);
  const plainBuf = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, cipherBytes);
  return new TextDecoder().decode(plainBuf);
}

function resetVaultLockTimer() {
  clearTimeout(vaultLockTimer);
  vaultLockTimer = setTimeout(() => lockVault(false), 5 * 60 * 1000);
}
function lockVault(manual) {
  vaultKey = null;
  vaultDecryptedCache = {};
  clearTimeout(vaultLockTimer);
  if (manual) showToast('Vault locked');

}

async function vaultSetup() {
  const pw1 = document.getElementById('vault-pw1').value;
  const pw2 = document.getElementById('vault-pw2').value;
  if (!pw1 || pw1.length < 4) { showToast('Use at least 4 characters'); return; }
  if (pw1 !== pw2) { showToast("Passwords don't match"); return; }
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const key = await deriveVaultKey(pw1, salt);
  const check = await vaultEncrypt(key, 'VAULT_OK');
  await setDoc(dref('vaultMeta','meta'), { salt: b64FromBytes(salt), checkIv: check.iv, checkCipher: check.cipher, createdAt: serverTimestamp() });
  vaultKey = key;
  vaultDecryptedCache = {};
  showToast('Vault created');
  resetVaultLockTimer();
  renderVaultBody();
}

async function vaultUnlock() {
  const pwEl = document.getElementById('vault-unlock-pw');
  const pw = pwEl.value;
  if (!pw) return;
  try {
    const salt = bytesFromB64(vaultMeta.salt);
    const key = await deriveVaultKey(pw, salt);
    const decoded = await vaultDecrypt(key, vaultMeta.checkIv, vaultMeta.checkCipher);
    if (decoded !== 'VAULT_OK') throw new Error('bad password');
    vaultKey = key;
    vaultDecryptedCache = {};
    showToast('Vault unlocked');
    resetVaultLockTimer();
    renderVaultBody();
  } catch {
    showToast('Incorrect password');
  }
}

async function vaultEntryClick(e) {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const { action, id, label } = btn.dataset;
  const entry = vaultEntries.find(x => x.id === id);
  if (!entry) return;

  if (action === 'reveal') {
    if (vaultDecryptedCache[id] !== undefined) {
      delete vaultDecryptedCache[id];
    } else {
      try {
        vaultDecryptedCache[id] = await vaultDecrypt(vaultKey, entry.iv, entry.cipher);
      } catch { showToast('Could not decrypt — try unlocking again'); return; }
    }
    resetVaultLockTimer();
    renderVaultEntries();
  } else if (action === 'copy') {
    try {
      let plain = vaultDecryptedCache[id];
      if (plain === undefined) plain = await vaultDecrypt(vaultKey, entry.iv, entry.cipher);
      await navigator.clipboard.writeText(plain);
      showToast('Copied to clipboard');
      resetVaultLockTimer();
    } catch { showToast('Could not copy'); }
  } else if (action === 'delete') {
    if (confirm(`Delete "${label}" from the vault?`)) {
      deleteDoc(dref('vaultEntries', id));
      delete vaultDecryptedCache[id];
      showToast('Removed from vault');
    }
  }
}

// ── TODOS ──
// NOTE: we query with only a single `where` clause and sort client-side.
// Combining where() + orderBy() on different fields needs a Firestore
// composite index — without it the query silently fails and the UI
// gets stuck on "Loading…" forever. Sorting in JS avoids that entirely.
function sortTodos(list) {
  const pOrder = { high:0, med:1, low:2, '':3 };
  return list.sort((a,b) => {
    const pa = pOrder[a.priority||''] ?? 3, pb = pOrder[b.priority||''] ?? 3;
    if (pa !== pb) return pa - pb;
    if (a.due && b.due) return a.due < b.due ? -1 : a.due > b.due ? 1 : 0;
    if (a.due) return -1;
    if (b.due) return 1;
    return (a.createdAt?.seconds||0) - (b.createdAt?.seconds||0);
  });
}

function todoRowHtml(t) {
  const t0 = today();
  const overdue = t.due && t.due < t0 && !t.done;
  const badge = t.priority === 'high' ? '<span class="todo-badge badge-high">High</span>'
    : t.priority === 'med' ? '<span class="todo-badge badge-med">Med</span>'
    : t.priority === 'low' ? '<span class="todo-badge badge-low">Low</span>' : '';
  const due = t.due ? `<span class="todo-due${overdue?' overdue':''}">${overdue?'Overdue ':'Due '}${t.due}</span>` : '';
  return `<div class="todo-box"></div><span class="todo-text">${esc(t.text)}</span><div class="todo-meta">${due}${badge}</div><button class="todo-del" data-id="${t.id}">✕</button>`;
}

function loadTodos(ctxId, targetElId) {
  const elId = targetElId || `todos-${ctxId}`;
  const q = query(col('todos'), where('ctxId','==',ctxId));
  const unsub = onSnapshot(q, snap => {
    const all = snap.docs.map(d => ({id:d.id,...d.data()}));
    const pending = sortTodos(all.filter(t => !t.done));
    const el = document.getElementById(elId);
    if (!el) return unsub();
    if (!pending.length) { el.innerHTML = '<div class="empty-line">No tasks yet — add your first one above.</div>'; return; }
    el.innerHTML = '';
    pending.forEach(t => {
      const item = document.createElement('div');
      item.className = 'todo-item';
      item.innerHTML = todoRowHtml(t);
      item.querySelector('.todo-box').onclick = () => { item.classList.add('completing'); updateDoc(dref('todos',t.id),{done:true}); setTimeout(()=>item.remove(),350); };
      item.querySelector('.todo-del').onclick = e => { e.stopPropagation(); deleteDoc(dref('todos',t.id)); showToast('Task removed'); };
      el.appendChild(item);
    });
  }, err => { console.error('loadTodos error', err); showToast('Could not load tasks'); });
  unsubs.push(unsub);
}

// ── SIMPLE LIST MODAL (read-only — used for "Daily Habits" / "Habits left today") ──
function openListModal(title, items) {
  document.getElementById('modal-title').textContent = title;
  const body = document.getElementById('modal-body');
  if (!items.length) {
    body.innerHTML = '<div class="empty-line">Nothing here right now.</div>';
  } else {
    body.innerHTML = items.map(h => `
      <div style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px;font-size:13px;">
        <div class="habit-ring" style="flex-shrink:0"></div>
        ${h.link ? '<span class="habit-link-icon">🔗</span>' : ''}
        <span style="flex:1">${esc(h.name)}</span>
        <button class="todo-del" style="display:block" data-id="${h.id}" data-name="${esc(h.name)}">✕</button>
      </div>
    `).join('');
    body.querySelectorAll('.todo-del').forEach(btn => {
      btn.onclick = () => {
        if (confirm(`Delete habit "${btn.dataset.name}"? This can't be undone.`)) {
          deleteDoc(dref('habits', btn.dataset.id));
          showToast('Habit deleted');
          btn.closest('div').remove();
        }
      };
    });
  }
  document.getElementById('modal-cancel').style.display = 'none';
  const confirmBtn = document.getElementById('modal-confirm');
  confirmBtn.textContent = 'Close';
  confirmBtn.onclick = closeModal;
  document.getElementById('modal-overlay').classList.add('open');
}

// ── MODAL ──
function openModal(title, fields, confirmLabel, cb) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-confirm').textContent = confirmLabel || 'Add';
  document.getElementById('modal-cancel').style.display = '';

  const body = document.getElementById('modal-body');
  body.innerHTML = '';
  const vals = {};
  const getters = [];
  let focused = false;

  fields.forEach(f => {
    if (f.label) {
      const lbl = document.createElement('div');
      lbl.textContent = f.label;
      lbl.style.cssText = 'font-size:11px;color:var(--text-muted);margin-bottom:5px;font-weight:600;';
      body.appendChild(lbl);
    }
    if (f.type === 'select') {
      const sel = document.createElement('select');
      sel.className = 'input-field';
      (f.options||[]).forEach(opt => {
        const o = document.createElement('option');
        o.value = opt.value; o.textContent = opt.label;
        if (f.default === opt.value) o.selected = true;
        sel.appendChild(o);
      });
      body.appendChild(sel);
      getters.push(() => { vals[f.id] = sel.value; });
    } else if (f.type === 'date') {
      const inp = document.createElement('input');
      inp.type = 'date'; inp.className = 'input-field';
      if (f.default) inp.value = f.default;
      body.appendChild(inp);
      getters.push(() => { vals[f.id] = inp.value; });
    } else if (f.type === 'textarea') {
      const ta = document.createElement('textarea');
      ta.className = 'input-field notes-area';
      ta.style.minHeight = '80px';
      ta.placeholder = f.placeholder || '';
      body.appendChild(ta);
      getters.push(() => { vals[f.id] = ta.value.trim(); });
    } else {
      const inp = document.createElement('input');
      inp.className = 'input-field';
      inp.placeholder = f.placeholder || '';
      inp.autocomplete = 'off';
      inp.onkeydown = e => { if (e.key==='Enter') doConfirm(); };
      body.appendChild(inp);
      getters.push(() => { vals[f.id] = inp.value.trim(); });
      if (!focused) { setTimeout(() => inp.focus(), 60); focused = true; }
    }
  });

  function doConfirm() {
    getters.forEach(g => g());
    cb(vals);
    closeModal();
  }

  document.getElementById('modal-confirm').onclick = doConfirm;
  document.getElementById('modal-overlay').classList.add('open');
}

document.getElementById('modal-cancel').onclick = closeModal;
document.getElementById('modal-overlay').onclick = e => { if (e.target===e.currentTarget) closeModal(); };
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

// ── SIDEBAR MOBILE ──
window.toggleSidebar = () => { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay-bg').classList.toggle('open'); };
window.closeSidebar  = () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay-bg').classList.remove('open'); };

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2000);
}
